<div class="flex-header">
    <h1><i class="fa fa-user"></i>
        <s5l>Subjects</s5l>
    </h1>
    <button [routerLink]="['create']"
            [class.hidden]="router.isActive('/admin/' + subjectsStore.structure?.id + '/subjects/create', true)">
        <s5l>create.user</s5l>
        <i class="fa fa-user-plus is-size-5"></i>
    </button>
</div>
<side-layout (closeCompanion)="closeCompanion()"
             [showCompanion]="!router.isActive('/admin/' + subjectsStore.structure?.id + '/subjects', true)">
     <div side-card>
                <list
                        [model]="subjectsStore.structure?.subjects.data"
                        searchPlaceholder="search.subject"
                        sort="subjectLabel"
                        noResultsLabel="list.results.no.subjects"
                        [isSelected]="isSelected"
                        [inputFilter]="filterByInput"
                        (inputChange)="subjectInputFilter = $event"
                        (onSelect)="openUserDetail($event)">>
                    <ng-template let-item>
                        {{ item.label }}
                    </ng-template>
                </list>
            </div>
    <div side-companion>
        <router-outlet></router-outlet>
    </div>
</side-layout>
